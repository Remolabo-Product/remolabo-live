<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リモラボ 朝昼夜活ライブ</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- Favicon -->
    <link rel="icon" href="assets/remonyan.png">
    <meta name="theme-color" content="#ffd54f">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">

    <!-- Firework埋め込みスクリプト -->
    <script async type="module" src="//asset.fwcdn3.com/js/module/fwn.js?business_id=o0WWlj"></script>
    <script async nomodule src="//asset.fwcdn3.com/js/fwn.js?business_id=o0WWlj"></script>

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- ヘッダー -->
        <header>
            <div class="header-content">
                <img src="assets/header-remonyan.png" alt="リモにゃん" class="header-icon">
                <h1>リモラボ 朝昼夜活ライブ</h1>
            </div>
        </header>

        <!-- Firework動画プレイヤー -->
        <section class="video-section">
            <h2 class="video-title">📺 タップして拡大！<br>ライブ動画はここ 🐱</h2>
            <p class="video-instruction">👇 動画をタップすると全画面で見られます</p>
            <div class="video-container">
                <fw-storyblock
                    channel="remolabo"
                    playlist="o8N2q4"
                ></fw-storyblock>
            </div>
        </section>

        <!-- 説明セクション -->
        <section class="info-section">
            <div class="info-box">
                <h2>📺 朝昼夜活ライブについて</h2>
                <p>リモラボの朝活・昼活・夜活で配信される動画が、このページで自動再生されます。</p>
                <p class="waiting-message">時間になったら始まるから、しばらくお待ちくださいにゃ 🐱</p>

                <div class="tips">
                    <h3>💡 ポイント</h3>
                    <ul>
                        <li>朝活・昼活・夜活の時間帯に自動で動画が再生されます</li>
                        <li>スマホからもアクセスできます</li>
                        <li>動画が再生されない場合は、ブラウザを更新してください</li>
                        <li>音量は調整できます</li>
                    </ul>
                </div>
            </div>
        </section>

        <!-- フッター -->
        <footer>
            <div class="footer-content">
                <img src="assets/footer-remonyan.png" alt="リモにゃん" class="footer-remonyan">
                <p class="footer-text">リモにゃんと一緒に、楽しく学びましょう！</p>
                <p class="copyright">© リモラボ</p>
            </div>
        </footer>
    </div>
</body>
</html>
